spring.application.name=ToboChatServer

server.port=8081
server.servlet.context-path=/api
spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI}
aws.cognito.userPoolId=${COGNITO_USER_POOL_ID}
aws.cognito.appClientId=${COGNITO_APP_CLIENT_ID}
aws.s3.bucketName=${BUCKET_NAME}
aws.dynamodb.tableName=${TABLE_NAME}
aws.region=${AWS_REGION:ap-southeast-2}

# Livekit
livekit.api.key=${LIVEKIT_API_KEY}
livekit.api.secret=${LIVEKIT_API_SECRET}

# Neo4j AuraDB
spring.neo4j.uri=${NEO4J_URI}
spring.neo4j.authentication.username=${NEO4J_USERNAME}
spring.neo4j.authentication.password=${NEO4J_PASSWORD}
spring.data.neo4j.database=${NEO4J_DATABASE}
logging.level.org.springframework.data.neo4j=DEBUG

# Redis connection
spring.data.redis.url=${REDIS_CONNECTION_STRING}
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# Gemini connection
google.gemini.api-key=${GEMINI_API_KEY}
google.gemini.url=${GEMINI_URL}

